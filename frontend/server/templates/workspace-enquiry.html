<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New Workspace Enquiry — RhaySource</title>
</head>
<body style="margin:0;padding:0;background-color:#060810;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#f1f5f9;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#060810;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;margin:0 auto;background-color:#0c0d12;border:1px solid #1e293b;border-radius:16px;overflow:hidden;box-shadow:0 10px 25px -5px rgba(0,0,0,0.4);">

          <!-- Header -->
          <tr>
            <td style="padding:40px 40px 32px;text-align:center;background:linear-gradient(to bottom, #0f172a, #0c0d12);">
              <div style="margin-bottom:20px;">
                <img src="cid:logo" alt="RhaySource Workspace" height="38" style="display:inline-block;max-height:38px;border:0;filter:grayscale(1) brightness(2) contrast(1.2);-webkit-filter:grayscale(1) brightness(2) contrast(1.2);">
              </div>
              <div style="display:inline-block;background-color:transparent;border:1px solid #38bdf8;color:#38bdf8;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:6px 18px;border-radius:20px;">
                New Tech Enquiry
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 48px;">
              <p style="margin:0 0 24px;font-size:14px;color:#94a3b8;line-height:1.6;">
                A new technical enquiry has been submitted through the Workspace website. Details are listed below.
              </p>

              <!-- Customer details card -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;border:1px solid #1e293b;border-radius:12px;overflow:hidden;">
                <tr>
                  <td style="padding:16px;font-size:12px;color:#64748b;width:30%;background-color:#0f172a;border-bottom:1px solid #1e293b;">Customer</td>
                  <td style="padding:16px;font-size:14px;font-weight:600;color:#f1f5f9;border-bottom:1px solid #1e293b;">{{name}}</td>
                </tr>
                <tr>
                  <td style="padding:16px;font-size:12px;color:#64748b;background-color:#0f172a;">Direct Email</td>
                  <td style="padding:16px;font-size:14px;color:#38bdf8;font-weight:500;">
                    <a href="mailto:{{email}}" style="color:#38bdf8;text-decoration:none;">{{email}}</a>
                  </td>
                </tr>
              </table>

              <!-- Message card -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:32px;border-radius:12px;overflow:hidden;border:1px solid #1e293b;background-color:#1e293b;">
                <tr>
                  <td style="padding:12px 20px;background-color:#1e293b;border-bottom:1px solid #334155;">
                    <span style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#38bdf8;">Technical Manifest / Message</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:24px;">
                    <p style="margin:0;font-size:15px;line-height:1.75;color:#cbd5e1;white-space:pre-line;">{{message}}</p>
                  </td>
                </tr>
              </table>

              <!-- Action Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="mailto:{{email}}?subject=Re: Your RhaySource Workspace Enquiry"
                       style="display:inline-block;background-color:#38bdf8;color:#0c0d12;font-weight:700;font-size:14px;padding:14px 40px;border-radius:8px;text-decoration:none;letter-spacing:0.02em;">
                      Respond to Request
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#0f172a;padding:24px 40px;text-align:center;border-top:1px solid #1e293b;">
              <p style="margin:0;font-size:10px;color:#475569;letter-spacing:0.05em;text-transform:uppercase;">
                Internal Workspace Notification System
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
