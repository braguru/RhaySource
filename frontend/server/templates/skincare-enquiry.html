<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New Enquiry — RhaySource</title>
</head>
<body style="margin:0;padding:0;background-color:#fafaf9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#fafaf9;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;margin:0 auto;background-color:#ffffff;border:1px solid #e7e5e4;border-radius:16px;overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">

          <!-- Header -->
          <tr>
            <td style="padding:40px 40px 32px;text-align:center;">
              <div style="margin-bottom:20px;">
                <img src="cid:logo" alt="RhaySource" height="42" style="display:inline-block;max-height:42px;border:0;">
              </div>
              <div style="display:inline-block;background-color:#fefce8;color:#a16207;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 16px;border-radius:20px;border:1px solid #fef08a;">
                New Customer Enquiry
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:0 40px 48px;">
              <p style="margin:0 0 24px;font-size:14px;color:#57534e;line-height:1.6;">
                A new inquiry has been submitted through the RhaySource website.
              </p>

              <!-- Customer details card -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;border:1px solid #f5f5f4;border-radius:12px;overflow:hidden;">
                <tr>
                  <td style="padding:16px;font-size:12px;color:#a8a29e;width:30%;background-color:#fafaf9;border-bottom:1px solid #f5f5f4;">Name</td>
                  <td style="padding:16px;font-size:14px;font-weight:600;color:#1e293b;border-bottom:1px solid #f5f5f4;">{{name}}</td>
                </tr>
                <tr>
                  <td style="padding:16px;font-size:12px;color:#a8a29e;background-color:#fafaf9;">Email</td>
                  <td style="padding:16px;font-size:14px;color:#1e293b;font-weight:500;">{{email}}</td>
                </tr>
              </table>

              <!-- Message card -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:32px;border-radius:12px;overflow:hidden;border:1px solid #f5f5f4;">
                <tr>
                  <td style="background-color:#fafaf9;padding:12px 16px;border-bottom:1px solid #f5f5f4;">
                    <span style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#78716c;">Message Content</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:24px;background-color:#ffffff;">
                    <p style="margin:0;font-size:15px;line-height:1.75;color:#44403c;white-space:pre-line;">{{message}}</p>
                  </td>
                </tr>
              </table>

              <!-- Action Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="mailto:{{email}}?subject=Re: Your RhaySource Inquiry"
                       style="display:inline-block;background-color:#0c0d12;color:#ffffff;font-weight:600;font-size:14px;padding:14px 36px;border-radius:8px;text-decoration:none;letter-spacing:0.02em;">
                      Reply to {{name}}
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#fafaf9;padding:24px 40px;text-align:center;border-top:1px solid #f5f5f4;">
              <p style="margin:0;font-size:11px;color:#a8a29e;letter-spacing:0.03em;">
                RhaySource Internal Enquiry Notification
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
